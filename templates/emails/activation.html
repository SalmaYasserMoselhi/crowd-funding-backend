<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Activate your account</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f9f9f9; padding: 40px;">
  <div style="max-width: 520px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 32px;">
    <h2 style="color: #1a1a1a;">Welcome to CrowdFund Egypt, {{ user.first_name }}!</h2>
    <p style="color: #444;">Click the button below to activate your account. This link expires in 24 hours.</p>
    <a href="{{ activation_url }}"
       style="display: inline-block; margin-top: 16px; padding: 12px 28px;
              background: #e63946; color: #fff; text-decoration: none;
              border-radius: 6px; font-weight: bold;">
      Activate Account
    </a>
    <p style="color: #888; margin-top: 24px; font-size: 13px;">
      If you didn't create an account, you can safely ignore this email.
    </p>
  </div>
</body>
</html>
